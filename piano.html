    <style>
        /* 画面全体を使ってピアノを配置 */
        body {
            background: #E0F7FA;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* スクロール禁止 */
        }

        .piano-container {
            box-sizing: border-box;
            background: white;
            width: 98vw;
            height: 96vh;
            padding: 10px;
            border-radius: 20px;
            border: 4px solid #FF80AB;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .header-area {
            flex: 0 0 auto;
            margin-bottom: 5px;
        }

        .tab-menu {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 5px;
        }

        .tab-btn {
            padding: 8px 20px;
            border-radius: 12px;
            border: 2px solid #FF80AB;
            background: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: #FF80AB;
            color: white;
        }

        /* ピアノグリッド：PC時は10列、モバイルは5列 */
        .piano-grid {
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            gap: 5px;
            padding: 5px;
            background: #FFF5F7;
            border-radius: 15px;
            overflow-y: auto;
            /* 万が一入り切らない場合のみ */

            /* デフォルト（PC）：10列 */
            grid-template-columns: repeat(10, 1fr);
            align-content: start;
        }

        /* モバイル：5列 & ボタンを正方形に近く */
        @media (max-width: 600px) {
            .piano-container {
                height: 94dvh;
                /* Account for mobile browser UI */
            }

            .piano-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 3px;
                padding: 3px;
            }

            .key {
                aspect-ratio: 1 / 0.85 !important;
                /* Slightly shorter than full square to fit all rows */
                padding: 2px !important;
            }

            .key .char {
                font-size: 1.2rem !important;
            }

            .key .th {
                font-size: 0.45rem !important;
            }
        }

        .key {
            background: white;
            border: 2px solid #FF80AB;
            border-radius: 8px;
            padding: 10px 2px;
            cursor: pointer;
            transition: 0.05s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #FF80AB;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: none;
            background: #FFD1E1;
        }

        .key .char {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
            line-height: 1;
        }

        .key .th {
            font-size: 0.6rem;
            color: #FF4081;
            margin-top: 2px;
        }

        .footer-area {
            flex: 0 0 auto;
            padding-top: 5px;
            padding-bottom: 15px;
            /* Added extra padding at the bottom for iOS home bar */
        }

        .back-home {
            background: none;
            border: none;
            color: #999;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }
