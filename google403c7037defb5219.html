<!-- Dynamic Ad Banner -->
<script>
(function() {
  function initAdBanner() {
    var path = window.location.pathname.toLowerCase();

    var adContainer = document.createElement('div');

    var style = document.createElement('style');
    style.innerHTML = 
      '#dynamic-sticky-ad-banner {' +
      '  position: fixed;' +
      '  right: 20px;' +
      '  bottom: 20px;' +
      '  z-index: 99999;' +

      '}' +

      '    border-radius: 12px;' +

      '    align-items: center;' +

      '  }' +

      '    width: 100% !important;' +

      '    position: relative;' +
      '    overflow: hidden;' +
      '  }' +
      '  .klook-wrapper ins {' +
      '    position: absolute;' +
      '    top: 0;' +
      '    left: 50%;' +
      '    width: 468px !important;' +
      '    transform: translateX(-50%) scale(0.7);' +
      '    transform-origin: top center;' +
      '    display: block;' +
      '  }' +
      '  #close-ad-banner {' +
      '    top: -10px !important;' +
      '    left: -5px !important;' +
      '    width: 28px !important;' +
      '    height: 28px !important;' +
      '    font-size: 14px !important;' +
      '  }' +
      '}';
    
    document.head.appendChild(style);
    document.body.appendChild(adContainer);
    
    var closeBtn = document.getElementById('close-ad-banner');
    if (closeBtn) {

    (function (d, sc, u) {

})();
